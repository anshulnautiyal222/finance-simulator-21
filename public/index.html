<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinQuest — Master Your Money Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #07090f;
        --neon: #00f5c4;
        --neon2: #ff6b35;
        --purple: #7c3aed;
        --gold: #fbbf24;
        --text: #e8edf5;
        --muted: #5a6a82;
      }
      html { scroll-behavior: smooth; }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        overflow-x: hidden;
        cursor: none;
      }
      #root { min-height: 100vh; }
      ::selection { background: rgba(0,245,196,0.3); }

      /* Custom cursor */
      .cursor-dot {
        width: 8px; height: 8px;
        background: var(--neon);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        transition: transform 0.1s, width 0.2s, height 0.2s;
        mix-blend-mode: screen;
      }
      .cursor-ring {
        width: 32px; height: 32px;
        border: 1.5px solid rgba(0,245,196,0.5);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%, -50%);
        transition: all 0.12s ease;
      }
      .cursor-dot.hovering { width: 14px; height: 14px; background: var(--neon2); }
      .cursor-ring.hovering { width: 48px; height: 48px; border-color: var(--neon2); }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: rgba(0,245,196,0.2); border-radius: 3px; }

      /* Noise texture overlay */
      body::after {
        content: '';
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 99990;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
